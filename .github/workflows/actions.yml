name: run main.py

on:
  schedule:
    - cron: '30 19 * * *' # At 19:30 everyday
    - cron: '30  7 * * *' # At 07:30 everyday
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # Allow pushing to the repo

    steps:
      - name: checkout repo content
        uses: actions/checkout@v4 # checkout the repository content

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # install the python version needed
          cache: 'pip' # caching pip dependencies

      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: execute py script # run main.py
        env:
          DATAPOINT_KEY: ${{ secrets.DATAPOINT_KEY }}
        run: |
          echo Running File...
          status=$(python main.py > log.txt 2>&1; echo $?)
          cat log.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
        id: run

      - name: Commit log
        if: steps.run.outputs.status == '0' # Only commit if script succeeded
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add -A
          # Check if there are changes before committing
          if ! git diff-index --quiet HEAD; then
            git commit -m "deploy workflow logs [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Check run status
        if: steps.run.outputs.status != '0'
        run: exit "${{ steps.run.outputs.status }}"
